services:
  sd-editor:
    image: ghcr.io/knaw-huc/service-huc-editor:2.0-rc13-alpha 
    pull_policy: always
    environment:
      - BASE_URL=http://localhost:1210
      # - CDN_URL=https://alpha-cmdicdn.sd.di.huc.knaw.nl
      - CDN_URL=http://localhost:1310
    volumes:
      - ./data-k8s:/home/huc/huc-editor-service/data
    networks:
      - sd-editor
    ports:
      - "1210:1210"

  cdn:
    image: ghcr.io/knaw-huc/huc-generic-editor:1.3-rc9-alpha 
    pull_policy: always
    restart: unless-stopped
    ports:
      - "1310:80"
    networks:
      - sd-editor

networks:
  sd-editor:
    external: false
